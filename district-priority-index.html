const GROUPS = [
  { key:"ses", label:"Socioeconomic", short:"SES", accent:"#f43f5e",
    vars:[1,2,3,4,5], tips:["Poverty","Education","Health Ins","Income↑","SNAP"] },
  { key:"dig", label:"Digital Access", short:"DIG", accent:"#f97316",
    vars:[0], tips:["No Computer"] },
  { key:"civ", label:"Low Engagement", short:"CIV", accent:"#6366f1",
    vars:[7,8,9], tips:["Reg Turnout (inv)","Elig Turnout (inv)","Reg–Elig Gap"] },
  { key:"inc", label:"Incumbent Tenure", short:"INC", accent:"#94a3b8",
    vars:[6], tips:["Career Length"] },
];

function computeStats(keys) {
  return Array.from({length:10}, (_, v) => {
    const vals = keys.map(d => RAW[d][v] * DIRS[v]);
    const mean = vals.reduce((a,b)=>a+b,0) / vals.length;
    const std = Math.sqrt(vals.reduce((a,b)=>a+(b-mean)**2,0) / vals.length) || 1;
    return { mean, std };
  });
}

function calcScores(keys, stats, wArr) {
  const total = wArr.reduce((a,b)=>a+b,0) || 1;
  const nw = wArr.map(w => w/total);
  return keys.map(d => {
    const subs = GROUPS.map(g => {
      const zs = g.vars.map(v => (RAW[d][v]*DIRS[v] - stats[v].mean) / stats[v].std);
      return zs.reduce((a,b)=>a+b,0) / zs.length;
    });
    const master = subs.reduce((a,b,i) => a + b*nw[i], 0);
    return { d, subs, master };
  });
}

function heatColor(t) {
  if (t < 0.5) {
    const p = t*2;
    return `rgb(${Math.round(59+p*(251-59))},${Math.round(130+p*(191-130))},${Math.round(246+p*(36-246))})`;
  } else {
    const p = (t-0.5)*2;
    return `rgb(${Math.round(251+p*(220-251))},${Math.round(191+p*(38-191))},${Math.round(36+p*(38-36))})`;
  }
}

function App() {
  const [weights, setWeights] = useState([25,25,25,25]);
  const [chamber, setChamber] = useState("all");
  const [sortCol, setSortCol] = useState("master");
  const [sortDir, setSortDir] = useState(-1);

  const allKeys = useMemo(() => Object.keys(RAW), []);
  const stats = useMemo(() => computeStats(allKeys), [allKeys]);
  const allScores = useMemo(() => calcScores(allKeys, stats, weights), [allKeys, stats, weights]);

  const filtered = useMemo(() => {
    let rows = allScores;
    if (chamber === "hd") rows = rows.filter(r => r.d.startsWith("HD"));
    if (chamber === "sd") rows = rows.filter(r => r.d.startsWith("SD"));
    return [...rows].sort((a,b) => {
      const gi = GROUPS.findIndex(g => g.key === sortCol);
      const va = gi >= 0 ? a.subs[gi] : a.master;
      const vb = gi >= 0 ? b.subs[gi] : b.master;
      return sortDir * (vb - va);
    });
  }, [allScores, chamber, sortCol, sortDir]);

  const masterVals = filtered.map(r => r.master);
  const mMax = Math.max(...masterVals), mMin = Math.min(...masterVals), mRange = mMax-mMin || 1;

  function subRange(i) {
    const vals = filtered.map(r => r.subs[i]);
    const mn = Math.min(...vals), mx = Math.max(...vals);
    return { mn, rng: mx-mn || 1 };
  }

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => -d);
    else { setSortCol(col); setSortDir(-1); }
  }

  const total = weights.reduce((a,b)=>a+b,0) || 1;
  const pcts = weights.map(w => Math.round(w/total*100));

  const presets = [
    {label:"Equal",      w:[25,25,25,25]},
    {label:"SES Heavy",  w:[60,10,20,10]},
    {label:"Turnout",    w:[20,10,60,10]},
    {label:"Entrenched", w:[20,10,20,50]},
  ];

  return (
    <div style={{padding:"24px 20px", maxWidth:960, margin:"0 auto"}}>

      {/* Header */}
      <div style={{marginBottom:24, borderBottom:"1px solid #1e2130", paddingBottom:18}}>
        <div className="syne" style={{fontSize:26, fontWeight:800, letterSpacing:"-0.02em", color:"#f8fafc", lineHeight:1}}>
          District Priority Index
        </div>
        <div style={{fontSize:11, color:"#475569", marginTop:6, letterSpacing:".07em"}}>
          2024 PRIMARY · Z-SCORE COMPOSITE · HAWAII STATE LEGISLATURE · {filtered.length} DISTRICTS
        </div>
      </div>

      {/* Weight Controls */}
      <div style={{background:"#161922", border:"1px solid #1e2130", borderRadius:10, padding:"16px 20px", marginBottom:14}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14, flexWrap:"wrap", gap:8}}>
          <span style={{fontSize:10, color:"#475569", letterSpacing:".09em", fontWeight:500}}>COMPOSITE WEIGHTS</span>
          <div style={{display:"flex", gap:5, flexWrap:"wrap"}}>
            {presets.map(p => (
              <button key={p.label} className="btn" onClick={() => setWeights(p.w)}>{p.label}</button>
            ))}
          </div>
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px 28px"}}>
          {GROUPS.map((g, i) => (
            <div key={g.key}>
              <div style={{display:"flex", justifyContent:"space-between", marginBottom:5}}>
                <span style={{fontSize:11, color:g.accent, fontWeight:500}}>{g.label}</span>
                <span style={{fontSize:11, color:"#94a3b8"}}>{pcts[i]}%</span>
              </div>
              <input type="range" min="0" max="100" value={weights[i]}
                onChange={e => { const n=[...weights]; n[i]=+e.target.value; setWeights(n); }}
                style={{background:`linear-gradient(to right,${g.accent} ${pcts[i]}%,#2d3748 ${pcts[i]}%)`}}
              />
              <div style={{fontSize:10, color:"#334155", marginTop:3}}>
                {g.tips.join(" · ")}
              </div>
            </div>
          ))}
        </div>
        {/* Stacked bar */}
        <div style={{marginTop:14, paddingTop:12, borderTop:"1px solid #1e2130", display:"flex", alignItems:"center", gap:10}}>
          <span style={{fontSize:10, color:"#334155", whiteSpace:"nowrap"}}>NORMALIZED</span>
          <div style={{display:"flex", flex:1, height:7, borderRadius:4, overflow:"hidden"}}>
            {GROUPS.map((g, i) => (
              <div key={g.key} style={{flex:pcts[i], background:g.accent, transition:"flex .3s ease"}} />
            ))}
          </div>
          {GROUPS.map((g, i) => (
            <span key={g.key} style={{fontSize:10, color:g.accent, whiteSpace:"nowrap"}}>{g.short} {pcts[i]}%</span>
          ))}
        </div>
      </div>

      {/* Chamber Filter */}
      <div style={{display:"flex", gap:6, marginBottom:12}}>
        {[["all","ALL DISTRICTS"],["hd","HOUSE (HD)"],["sd","SENATE (SD)"]].map(([v,l]) => (
          <button key={v} className={`btn${chamber===v?" active":""}`} onClick={() => setChamber(v)}>{l}</button>
        ))}
      </div>

      {/* Table */}
      <div style={{background:"#161922", border:"1px solid #1e2130", borderRadius:10, overflowX:"auto"}}>
        <table style={{width:"100%", borderCollapse:"collapse", fontSize:12}}>
          <thead>
            <tr style={{borderBottom:"2px solid #1e2130"}}>
              <th style={{padding:"10px 14px", textAlign:"left", color:"#334155", fontSize:10, letterSpacing:".08em", fontWeight:400}}>#</th>
              <th style={{padding:"10px 14px", textAlign:"left", color:"#334155", fontSize:10, letterSpacing:".08em", fontWeight:400}}>DIST</th>
              {GROUPS.map((g, i) => (
                <th key={g.key} onClick={() => toggleSort(g.key)} className="thb"
                  style={{padding:"10px 14px", textAlign:"left", color:sortCol===g.key?g.accent:"#475569",
                    fontSize:10, letterSpacing:".08em", fontWeight:400, whiteSpace:"nowrap", transition:"color .15s"}}>
                  {g.short}{sortCol===g.key ? (sortDir===-1?" ↓":" ↑") : ""}
                </th>
              ))}
              <th onClick={() => toggleSort("master")} className="thb"
                style={{padding:"10px 14px", textAlign:"left",
                  color:sortCol==="master"?"#e2e8f0":"#475569",
                  fontSize:10, letterSpacing:".08em", fontWeight:400, whiteSpace:"nowrap", transition:"color .15s"}}>
                MASTER{sortCol==="master" ? (sortDir===-1?" ↓":" ↑") : ""}
              </th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((row, rank) => {
              const t = (row.master - mMin) / mRange;
              const bc = heatColor(t);
              return (
                <tr key={row.d} className="rh" style={{borderBottom:"1px solid #0f1117", transition:"background .1s"}}>
                  <td style={{padding:"8px 14px", color:"#334155", fontSize:11}}>{rank+1}</td>
                  <td style={{padding:"8px 14px"}}>
                    <span className="pill" style={{
                      background: row.d.startsWith("SD") ? "rgba(99,102,241,0.15)" : "rgba(244,63,94,0.12)",
                      color: row.d.startsWith("SD") ? "#818cf8" : "#fb7185"
                    }}>{row.d}</span>
                  </td>
                  {row.subs.map((s, i) => {
                    const {mn, rng} = subRange(i);
                    const pct = Math.max(0, Math.min(100, ((s-mn)/rng)*100));
                    return (
                      <td key={i} style={{padding:"8px 14px"}}>
                        <div style={{display:"flex", alignItems:"center", gap:6}}>
                          <div style={{width:44, height:3, background:"#1e2130", borderRadius:2, overflow:"hidden"}}>
                            <div style={{width:`${pct}%`, height:"100%", background:GROUPS[i].accent, opacity:.75, transition:"width .3s"}} />
                          </div>
                          <span style={{color:s>0?"#cbd5e1":"#475569", fontSize:11, width:36, textAlign:"right", fontVariantNumeric:"tabular-nums"}}>
                            {s>0?"+":""}{s.toFixed(2)}
                          </span>
                        </div>
                      </td>
                    );
                  })}
                  <td style={{padding:"8px 14px"}}>
                    <div style={{display:"flex", alignItems:"center", gap:8}}>
                      <div style={{width:60, height:5, background:"#1e2130", borderRadius:3, overflow:"hidden"}}>
                        <div style={{width:`${Math.max(2, t*100)}%`, height:"100%", background:bc, borderRadius:3, transition:"width .3s, background .3s"}} />
                      </div>
                      <span style={{color:bc, fontWeight:500, fontSize:12, width:40, textAlign:"right", fontVariantNumeric:"tabular-nums"}}>
                        {row.master>0?"+":""}{row.master.toFixed(2)}
                      </span>
                    </div>
                  </td>
                </tr>
              );
            })}
