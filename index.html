    .medal-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); }

    .medal-3 { background: linear-gradient(135deg, #cd7f32, #a16207); }
    .medal-4 { background: #1e3a5f; }
    .medal-5 { background: #1e3a5f; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

</head>

const VARIABLES = [
  { key: "no_computer",        label: "Without a Computer",             color: "#ef4444", icon: "💻", desc: "% households lacking computer access" },
  { key: "poverty",            label: "Below Poverty Level",            color: "#f97316", icon: "📉", desc: "% population below poverty line" },
  { key: "edu_below_ba",       label: "Education Below Bachelor's",     color: "#eab308", icon: "🎓", desc: "% adults without a BA degree" },
  { key: "public_health_ins",  label: "Public Health Insurance Only",   color: "#84cc16", icon: "🏥", desc: "% enrolled in Medicaid/CHIP only" },
  { key: "median_income_high", label: "Highest Median Income",          color: "#22c55e", icon: "💵", desc: "Top 5 median household income" },
  { key: "median_income_low",  label: "Lowest Median Income",           color: "#ef4444", icon: "💸", desc: "Bottom 5 median household income" },
  { key: "snap",               label: "Households on SNAP",             color: "#14b8a6", icon: "🛒", desc: "% households receiving SNAP benefits" },
  { key: "incumbent_career",   label: "Longest Incumbent Career",       color: "#8b5cf6", icon: "🗓️", desc: "Years in office — current incumbent" },

];

const MEDAL_STYLES = ["medal-1","medal-2","medal-3","medal-4","medal-5"];
const RANK_LABEL   = ["🥇","🥈","🥉","4","5"];

function RankCard({ item, color }) {
  return (
    <div className={`card-hover rounded-xl p-3 flex items-center gap-3 ${MEDAL_STYLES[item.rank-1]}`}>
      <div className="text-xl w-8 text-center font-bold">{RANK_LABEL[item.rank-1]}</div>
      <div className="flex-1">
        <div className="font-bold text-white text-base">{item.district}</div>
        <div className="text-white/80 text-sm">{item.value}</div>
      </div>
    </div>
  );
}

function VarSection({ varDef, data }) {
  return (
    <div className="bg-slate-800 rounded-2xl p-5 flex flex-col gap-3">
      <div className="flex items-center gap-2 mb-1">
        <span className="text-2xl">{varDef.icon}</span>
        <div>
          <div className="font-bold text-white text-sm">{varDef.label}</div>
          <div className="text-slate-400 text-xs">{varDef.desc}</div>
        </div>
      </div>
      <div className="flex flex-col gap-2">
        {data.map(item => <RankCard key={item.rank} item={item} color={varDef.color} />)}
      </div>
    </div>
  );
}

function App() {
  const [chamber, setChamber] = React.useState("HD");
  const data = chamber === "HD" ? HD_DATA : SD_DATA;

  return (
    <div className="min-h-screen bg-slate-900 text-white p-4 md:p-8">
      <div className="max-w-7xl mx-auto">
        {/* Header */}
        <div className="text-center mb-8">
          <h1 className="text-3xl md:text-4xl font-black tracking-tight mb-1">
            Moho ʻĀina <span className="text-blue-400">District Dashboard</span>
          </h1>
          <p className="text-slate-400 text-sm md:text-base mb-4">
            Top 5 districts per variable · Hawaiʻi 2024 Primary Data
          </p>
          {/* Chamber Toggle */}
          <div className="inline-flex bg-slate-800 rounded-full p-1 gap-1">
            {["HD","SD"].map(c => (
              <button
                key={c}
                onClick={() => setChamber(c)}
                className={`px-6 py-2 rounded-full font-bold text-sm transition-all ${
                  chamber === c
                    ? "bg-blue-600 text-white shadow"
                    : "text-slate-400 hover:text-white"
                }`}
              >
                {c === "HD" ? "House (HD1–51)" : "Senate (SD1–25)"}
              </button>
            ))}
          </div>
        </div>

        {/* Grid */}
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          {VARIABLES.map(v => (
            <VarSection key={v.key} varDef={v} data={data[v.key]} />
          ))}
        </div>

        <div className="text-center mt-8 text-slate-500 text-xs">
          Data: U.S. Census ACS · Hawaiʻi OIP · Office of Elections · Compiled by AI Nā Votes
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
